
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Alphabet Archery - Arcade Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg-color-center: #241442;
            --bg-color-edge: #050608;
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-yellow: #ffff00;
            --neon-red: #ff3333;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --font-game: 'Comic Sans MS', 'Comic Sans', cursive;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at 50% 50%, var(--bg-color-center) 0%, var(--bg-color-edge) 100%);
            color: white;
            font-family: var(--font-main);
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        #lobby {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background: rgba(5, 6, 8, 0.95);
            z-index: 100;
            padding-top: 5vh;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .lobby-title {
            font-family: var(--font-game);
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
            margin-bottom: 20px;
            text-align: center;
        }

        .settings-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 15px;
            padding: 20px;
            width: 90%;
            max-width: 700px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
        }

        .control-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .control-group label {
            display: flex;
            flex-direction: column;
            color: var(--neon-cyan);
            font-size: 0.9rem;
            text-shadow: 0 0 5px var(--neon-cyan);
        }

        select,
        input[type="range"] {
            margin-top: 5px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid var(--neon-cyan);
            padding: 8px;
            border-radius: 5px;
            font-family: var(--font-main);
        }

        .letters-section {
            border-top: 1px dashed var(--neon-cyan);
            padding-top: 15px;
        }

        .letters-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: var(--neon-cyan);
        }

        .letter-btn-group button {
            background: transparent;
            border: 1px solid var(--neon-yellow);
            color: var(--neon-yellow);
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
            margin-left: 5px;
            transition: 0.3s;
        }

        .letter-btn-group button:hover {
            background: var(--neon-yellow);
            color: var(--bg-color-edge);
        }

        .letter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
            gap: 10px;
        }

        .letter-checkbox {
            display: none;
        }

        .letter-label {
            display: block;
            text-align: center;
            border: 1px solid #555;
            border-radius: 5px;
            padding: 8px 0;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.2s;
        }

        .letter-checkbox:checked + .letter-label {
            border-color: var(--neon-magenta);
            color: #fff;
            background: rgba(255, 0, 255, 0.2);
            box-shadow: 0 0 10px var(--neon-magenta);
            text-shadow: 0 0 5px var(--neon-magenta);
        }

        .start-btn {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            background: transparent;
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            border-radius: 8px;
            box-shadow: 0 0 10px var(--neon-cyan), inset 0 0 10px var(--neon-cyan);
            transition: 0.3s;
        }

        .start-btn:hover {
            background: var(--neon-cyan);
            color: var(--bg-color-edge);
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        #game-container {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            pointer-events: none;
        }

        .zone-overlay {
            position: absolute;
            top: 0;
            width: 50vw;
            height: 100vh;
            display: none;
            z-index: 5;
            pointer-events: none;
            transition: background 0.3s;
        }

        #overlay-p1 {
            left: 0;
            background: rgba(0, 255, 255, 0.15);
            box-shadow: inset -10px 0 30px rgba(0, 255, 255, 0.2);
        }

        #overlay-p2 {
            left: 50vw;
            background: rgba(255, 0, 255, 0.15);
            box-shadow: inset 10px 0 30px rgba(255, 0, 255, 0.2);
        }

        .score-board {
            position: absolute;
            top: 2vh;
            width: 100%;
            display: flex;
            justify-content: space-around;
            font-size: clamp(1.2rem, 3vw, 2rem);
            font-weight: bold;
            pointer-events: none;
            z-index: 15;
        }

        .score-p1 {
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .score-p2 {
            color: #fff;
            text-shadow: 0 0 10px var(--neon-magenta);
        }

        .timer-display {
            color: var(--neon-yellow);
            text-shadow: 0 0 10px var(--neon-yellow);
        }

        .health-board {
            position: absolute;
            top: 7vh;
            width: 100%;
            display: flex;
            justify-content: space-around;
            font-size: clamp(1rem, 2vw, 1.5rem);
            pointer-events: none;
            z-index: 15;
        }

        #current-listen {
            position: absolute;
            top: 12vh;
            width: 100%;
            text-align: center;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: var(--neon-yellow);
            text-shadow: 0 0 10px var(--neon-yellow);
            pointer-events: auto;
            cursor: pointer;
            z-index: 15;
        }

        #btn-repeat-sound {
            position: absolute;
            top: 20vh;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            pointer-events: auto;
            cursor: pointer;
            padding: 10px 22px;
            border-radius: 999px;
            border: 2px solid var(--neon-yellow);
            background: rgba(255, 255, 0, 0.08);
            color: var(--neon-yellow);
            font-size: clamp(1rem, 2.2vw, 1.35rem);
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 0 12px rgba(255,255,0,0.35), inset 0 0 8px rgba(255,255,0,0.15);
            text-shadow: 0 0 8px var(--neon-yellow);
            transition: 0.12s;
        }

        #btn-repeat-sound:active {
            transform: translateX(-50%) scale(0.94);
            background: rgba(255, 255, 0, 0.22);
        }

        @keyframes pulse {
            0% {
                opacity: 0.7;
                transform: translateX(-50%) scale(0.9);
            }

            100% {
                opacity: 1;
                transform: translateX(-50%) scale(1.1);
            }
        }

        .waiting-text {
            position: absolute;
            bottom: 40vh;
            font-size: 4rem;
            color: #fff;
            font-weight: bold;
            display: none;
            pointer-events: none;
            z-index: 15;
            text-transform: uppercase;
            animation: pulse 0.8s infinite alternate;
        }

        #waiting-p1 {
            left: 25vw;
            transform: translateX(-50%);
            text-shadow: 0 0 20px var(--neon-cyan);
            transition: left 0.3s;
        }

        #waiting-p2 {
            left: 75vw;
            transform: translateX(-50%);
            text-shadow: 0 0 20px var(--neon-magenta);
        }

        .center-line {
            position: absolute;
            top: 0;
            left: 50vw;
            width: 2px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.2);
            pointer-events: none;
            z-index: 11;
            box-shadow: 0 0 10px #fff;
        }

        .arcade-controls {
            position: absolute;
            bottom: 3vh;
            height: 52px;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4vw;
            transition: width 0.3s, left 0.3s;
        }

        #ctrl-p1 {
            left: 0;
            width: 50vw;
        }

        #ctrl-p2 {
            left: 50vw;
            width: 50vw;
        }

        .btn-move,
        .btn-shoot {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 2px solid;
            border-radius: 10px;
            font-size: 1.25rem;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
            transition: 0.1s;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-move {
            width: 50px;
        }

        .btn-shoot {
            width: 100px;
            letter-spacing: 1px;
        }

        .btn-move:active,
        .btn-shoot:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.2);
        }

        #ctrl-p1 .btn-move,
        #ctrl-p1 .btn-shoot {
            border-color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        #ctrl-p2 .btn-move,
        #ctrl-p2 .btn-shoot {
            border-color: var(--neon-magenta);
            text-shadow: 0 0 10px var(--neon-magenta);
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
        }

        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(5, 6, 8, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            overflow-y: auto;
        }

        .go-title {
            font-size: 3rem;
            color: var(--neon-yellow);
            text-shadow: 0 0 20px var(--neon-yellow);
            margin-bottom: 20px;
            margin-top: 20px;
        }

        .panel-box {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--neon-cyan);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            width: 90%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        #input-section {
            display: flex;
            flex-direction: column;
            width: 100%;
            align-items: center;
        }

        .player-entry {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .player-entry input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #555;
            color: #fff;
            font-size: 1.5rem;
            width: 200px;
            text-align: center;
            margin: 0 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .player-entry input:focus {
            outline: none;
        }

        .player-entry input.active-input {
            border-bottom: 3px solid var(--neon-yellow);
            background: rgba(255, 255, 0, 0.1);
        }

        #virtual-keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #444;
            box-sizing: border-box;
        }

        .vk-row {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .vk-key {
            padding: 10px 12px;
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid #666;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.1s;
        }

        .vk-key:active {
            transform: scale(0.95);
            background: var(--neon-cyan);
            color: black;
        }

        .vk-key.special {
            background: rgba(0, 255, 255, 0.2);
            font-weight: bold;
        }

        .vk-key.enter-key {
            background: rgba(0, 255, 0, 0.2);
            color: #0f0;
            border-color: #0f0;
        }

        #leaderboard-section {
            display: none;
            flex-direction: column;
            width: 100%;
            align-items: center;
            max-height: 55vh;
            overflow: hidden;
        }

        #leaderboard-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-height: 42vh;
            overflow-y: auto;
            padding-right: 6px;
            box-sizing: border-box;
        }

        #leaderboard-list::-webkit-scrollbar {
            width: 8px;
        }

        #leaderboard-list::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 255, 0.45);
            border-radius: 999px;
        }

        #leaderboard-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.06);
            border-radius: 999px;
        }

        .rank-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            margin-bottom: 10px;
            width: 88%;
            border-bottom: 1px dashed #555;
            padding-bottom: 5px;
            flex-shrink: 0;
        }

        .rank-1 {
            color: var(--neon-yellow);
            font-weight: bold;
            text-shadow: 0 0 10px var(--neon-yellow);
        }

        .rank-2 {
            color: #ccc;
        }

        .rank-3 {
            color: #cd7f32;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn-group button {
            padding: 12px 25px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        #btn-play-again {
            background: transparent;
            color: var(--neon-magenta);
            border: 2px solid var(--neon-magenta);
            box-shadow: 0 0 10px var(--neon-magenta);
        }

        #btn-play-again:hover {
            background: var(--neon-magenta);
            color: #fff;
        }

        #btn-lobby {
            background: transparent;
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        #btn-lobby:hover {
            background: var(--neon-cyan);
            color: #fff;
        }

        .neon-cyan-glow {
            filter: drop-shadow(0 0 8px var(--neon-cyan));
        }

        .neon-magenta-glow {
            filter: drop-shadow(0 0 8px var(--neon-magenta));
        }

        .target-text {
            font-family: var(--font-game);
            font-size: 30px;
            fill: #fff;
            text-anchor: middle;
            dominant-baseline: central;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="lobby">
        <div class="lobby-title">Arcade Archery</div>

        <div class="settings-panel">
            <div class="control-group">
                <label>
                    Mode:
                    <select id="player-mode">
                        <option value="1">1 Player</option>
                        <option value="2">2 Players</option>
                    </select>
                </label>

                <label>
                    Time:
                    <select id="game-time">
                        <option value="30">30s</option>
                        <option value="45">45s</option>
                        <option value="60" selected>60s</option>
                        <option value="90">90s</option>
                    </select>
                </label>

                <label>
                    Drop Speed:
                    <input type="range" id="drop-speed" min="1" max="5" value="3">
                </label>

                <label>
                    Voice:
                    <select id="voice-gender">
                        <option value="F">Female (女)</option>
                        <option value="M">Male (男)</option>
                    </select>
                </label>
            </div>

            <div class="letters-section">
                <div class="letters-header">
                    <span>Target Letters:</span>
                    <div class="letter-btn-group">
                        <button id="btn-select-all">All</button>
                        <button id="btn-deselect-all">Clear</button>
                    </div>
                </div>
                <div class="letter-grid" id="letter-grid"></div>
            </div>

            <button class="start-btn" id="start-btn">Start Game</button>
        </div>
    </div>

    <div id="game-container">
        <div class="zone-overlay" id="overlay-p1"></div>
        <div class="zone-overlay" id="overlay-p2"></div>
        <div class="center-line" id="center-line"></div>

        <div class="score-board">
            <span class="score-p1" id="ui-score-p1">P1: <span id="p1-pts">0</span></span>
            <span class="timer-display" id="ui-timer">Time: 60s</span>
            <span class="score-p2" id="ui-score-p2" style="display: none;">P2: <span id="p2-pts">0</span></span>
        </div>

        <div class="health-board">
            <span id="hearts-p1">❤️❤️❤️❤️❤️</span>
            <span id="hearts-p2" style="display: none;">❤️❤️❤️❤️❤️</span>
        </div>

        <div id="current-listen">Listen & Shoot!</div>
        <button id="btn-repeat-sound" type="button">🔊 Repeat</button>

        <div class="waiting-text" id="waiting-p1">Waiting...</div>
        <div class="waiting-text" id="waiting-p2">Waiting...</div>

        <svg id="game-svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMax slice" overflow="visible">
            <defs>
                <g id="arrow-graphic">
                    <line x2="70" fill="none" stroke="currentColor" stroke-width="4" />
                    <polygon fill="currentColor" points="74 0 65 5 62 0 65 -5" />
                    <polygon fill="#fff" points="2 -6 -4 -6 -1 0 -4 6 2 6 5 0" />
                </g>

                <g id="bow-graphic" stroke-linecap="round">
                    <polyline class="string" fill="none" stroke="#666" stroke-width="3" points="0,-70 0,0 0,70" />
                    <path fill="none" stroke="currentColor" stroke-width="6" d="M0,70 C30,35 30,-35 0,-70" />
                </g>
            </defs>

            <g id="falling-targets-p1"></g>
            <g id="falling-targets-p2"></g>
            <g id="flying-arrows"></g>

            <g id="bow-p1" class="neon-cyan-glow" color="#00ffff" pointer-events="none" transform="translate(250, 920) scale(0.55)">
                <g class="bow-rotation" transform="rotate(-90)">
                    <use href="#bow-graphic" />
                    <g class="arrow-angle" opacity="0">
                        <use href="#arrow-graphic" />
                    </g>
                </g>
            </g>

            <g id="bow-p2" class="neon-magenta-glow" color="#ff00ff" pointer-events="none" opacity="0" transform="translate(750, 920) scale(0.55)">
                <g class="bow-rotation" transform="rotate(-90)">
                    <use href="#bow-graphic" />
                    <g class="arrow-angle" opacity="0">
                        <use href="#arrow-graphic" />
                    </g>
                </g>
            </g>
        </svg>

        <div class="arcade-controls" id="ctrl-p1">
            <button class="btn-move" id="btn-p1-left">◀</button>
            <button class="btn-shoot" id="btn-p1-shoot">SHOOT</button>
            <button class="btn-move" id="btn-p1-right">▶</button>
        </div>

        <div class="arcade-controls" id="ctrl-p2" style="display: none;">
            <button class="btn-move" id="btn-p2-left">◀</button>
            <button class="btn-shoot" id="btn-p2-shoot">SHOOT</button>
            <button class="btn-move" id="btn-p2-right">▶</button>
        </div>
    </div>

    <div id="game-over-screen">
        <div class="go-title">Game Over!</div>

        <div class="panel-box" id="input-section">
            <div class="player-entry" id="go-row-p1">
                <span style="color: var(--neon-cyan)">P1</span>
                <input type="text" id="input-name-p1" maxlength="15" placeholder="P1 Name" readonly class="active-input">
                <span class="score-val" id="go-score-p1" style="color: var(--neon-cyan)">0 pts</span>
            </div>

            <div class="player-entry" id="go-row-p2" style="display:none;">
                <span style="color: var(--neon-magenta)">P2</span>
                <input type="text" id="input-name-p2" maxlength="15" placeholder="P2 Name" readonly>
                <span class="score-val" id="go-score-p2" style="color: var(--neon-magenta)">0 pts</span>
            </div>

            <div id="virtual-keyboard"></div>
        </div>

        <div class="panel-box" id="leaderboard-section">
            <h2 style="text-align: center; color: var(--neon-cyan); margin-top: 0;">Top Players</h2>
            <div id="leaderboard-list"></div>
        </div>

        <div class="btn-group" id="end-buttons" style="display: none;">
            <button id="btn-play-again">Play Again</button>
            <button id="btn-lobby">Lobby</button>
        </div>
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSfx(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'shoot') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.15);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'error') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'success') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function updateLanesToMatchButtons() {
            let pt = svg.createSVGPoint();

            const getSvgX = (el) => {
                let rect = el.getBoundingClientRect();
                pt.x = rect.left + rect.width / 2;
                pt.y = 0;
                return pt.matrixTransform(svg.getScreenCTM().inverse()).x;
            };

            p1Lanes[0] = getSvgX(document.getElementById('btn-p1-left'));
            p1Lanes[1] = getSvgX(document.getElementById('btn-p1-shoot'));
            p1Lanes[2] = getSvgX(document.getElementById('btn-p1-right'));

            if (config.mode === 2) {
                p2Lanes[0] = getSvgX(document.getElementById('btn-p2-left'));
                p2Lanes[1] = getSvgX(document.getElementById('btn-p2-shoot'));
                p2Lanes[2] = getSvgX(document.getElementById('btn-p2-right'));
            }
        }

        function getSvgYFromScreenY(screenY) {
            let pt = svg.createSVGPoint();
            pt.x = 0;
            pt.y = screenY;
            return pt.matrixTransform(svg.getScreenCTM().inverse()).y;
        }

        function getTargetStartY() {
            // 依照實際螢幕最上方換算 SVG 座標，避免 Target 從中間突然出現
            return getSvgYFromScreenY(-80);
        }

        function getTargetEndY() {
            // 依照實際螢幕最下方換算 SVG 座標，掉出畫面後才重回上方
            return getSvgYFromScreenY(window.innerHeight + 100);
        }

        function isTargetInVisibleRange(targetY) {
            const topY = getSvgYFromScreenY(0);
            const bottomY = getSvgYFromScreenY(window.innerHeight);

            return targetY >= topY && targetY <= bottomY;
        }

        function getSpokenLetter(letter) {
            if (!letter) return "";
            const upper = letter.toUpperCase();

            if (upper === "Z") return "zee";

            return upper;
        }

        function createLetterUtterance(letter) {
            let utterance = new SpeechSynthesisUtterance(getSpokenLetter(letter));
            utterance.lang = 'en-US';
            utterance.rate = 0.85;

            let isMale = config.gender === 'M';
            let voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));

            let selectedVoice = voices.find(v => {
                let n = v.name.toLowerCase();
                return isMale
                    ? (n.includes('male') || n.includes('guy') || n.includes('david'))
                    : (n.includes('female') || n.includes('girl') || n.includes('zira') || n.includes('samantha'));
            });

            if (selectedVoice) {
                utterance.voice = selectedVoice;
            } else {
                utterance.pitch = isMale ? 0.6 : 1.4;
            }

            return utterance;
        }

        function speakOnce(letter) {
            return new Promise(resolve => {
                if (!('speechSynthesis' in window) || !letter) {
                    resolve();
                    return;
                }

                let finished = false;

                const done = () => {
                    if (!finished) {
                        finished = true;
                        resolve();
                    }
                };

                let utterance = createLetterUtterance(letter);
                utterance.onend = done;
                utterance.onerror = done;

                window.speechSynthesis.speak(utterance);

                setTimeout(done, 1700);
            });
        }

        async function playLetterSound(letter, doublePlay = true, onDone = null) {
            if (!letter) {
                if (onDone) onDone();
                return;
            }

            clearTimeout(audioTimeout);
            window.speechSynthesis.cancel();

            await speakOnce(letter);

            if (doublePlay) {
                await new Promise(resolve => {
                    audioTimeout = setTimeout(resolve, 500);
                });
                await speakOnce(letter);
            }

            if (onDone) onDone();
        }

        let activeInput = document.getElementById('input-name-p1');
        let vkIsCaps = true;

        const vkLayout = [
            ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
            ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
            ['CAPS', 'Z', 'X', 'C', 'V', 'B', 'N', 'M', 'DEL'],
            ['SPACE', 'ENTER']
        ];

        const setInputFocus = (el) => {
            activeInput.classList.remove('active-input');
            activeInput = el;
            activeInput.classList.add('active-input');
        };

        document.getElementById('input-name-p1').addEventListener('click', function () {

        });

        document.getElementById('input-name-p2').addEventListener('click', function () {
            setInputFocus(this);
        });

        function renderKeyboard() {
            const vkContainer = document.getElementById('virtual-keyboard');
            vkContainer.innerHTML = '';

            vkLayout.forEach(row => {
                let rowDiv = document.createElement('div');
                rowDiv.className = 'vk-row';

                row.forEach(key => {
                    let btn = document.createElement('button');
                    btn.className = 'vk-key';

                    if (['CAPS', 'DEL', 'SPACE'].includes(key)) {
                        btn.classList.add('special');
                    }

                    if (key === 'ENTER') {
                        btn.classList.add('enter-key');
                        btn.innerText = 'ENTER (Submit)';
                    } else {
                        btn.innerText = (key.length === 1 && !vkIsCaps) ? key.toLowerCase() : key;
                    }

                    btn.addEventListener('click', () => handleKeyPress(key));
                    rowDiv.appendChild(btn);
                });

                vkContainer.appendChild(rowDiv);
            });
        }

        function normalizePlayerName(name) {
            return (name || "").trim().replace(/\s+/g, " ").toLowerCase();
        }

        function addOrUpdateHighScore(name, score) {
            const displayName = (name || "").trim().replace(/\s+/g, " ") || "Player";
            const key = normalizePlayerName(displayName);
            const existing = highScores.find(entry => normalizePlayerName(entry.name) === key);

            if (existing) {
                if (score > existing.score) {
                    existing.score = score;
                    existing.name = displayName;
                }
            } else {
                highScores.push({
                    name: displayName,
                    score: score
                });
            }
        }

        function submitScores() {
            addOrUpdateHighScore(
                document.getElementById('input-name-p1').value || "Player 1",
                state.p1Score
            );

            if (config.mode === 2) {
                addOrUpdateHighScore(
                    document.getElementById('input-name-p2').value || "Player 2",
                    state.p2Score
                );
            }

            highScores.sort((a, b) => b.score - a.score || a.name.localeCompare(b.name));

            let listHTML = '';

            highScores.forEach((entry, idx) => {
                let rankClass = idx === 0 ? 'rank-1' : (idx === 1 ? 'rank-2' : (idx === 2 ? 'rank-3' : ''));
                listHTML += `
                    <div class="rank-row ${rankClass}">
                        <span>#${idx + 1} ${entry.name}</span>
                        <span>${entry.score} pts</span>
                    </div>
                `;
            });

            document.getElementById('leaderboard-list').innerHTML = listHTML || '<div class="rank-row"><span>No records yet</span><span>0 pts</span></div>';
            document.getElementById('input-section').style.display = 'none';
            document.getElementById('leaderboard-section').style.display = 'flex';
            document.getElementById('end-buttons').style.display = 'flex';
        }

        function handleKeyPress(key) {
            let val = activeInput.value;

            if (key === 'DEL') {
                activeInput.value = val.slice(0, -1);
            } else if (key === 'CAPS') {
                vkIsCaps = !vkIsCaps;
                renderKeyboard();
            } else if (key === 'SPACE') {
                if (val.length < 15) activeInput.value += ' ';
            } else if (key === 'ENTER') {
                if (config.mode === 2 && activeInput.id === 'input-name-p1') {
                    setInputFocus(document.getElementById('input-name-p2'));
                } else {
                    submitScores();
                }
            } else if (val.length < 15) {
                activeInput.value += (vkIsCaps ? key : key.toLowerCase());
            }
        }

        function renderHearts() {

            document.getElementById('hearts-p1').innerText = getHearts(state.hearts[1]);

        function calculateScoreForCorrectHit(playerNum) {
            const baseScore = 10;
            const firstHitBonus = 5;

            // 只有雙人模式才有「先射中加分」；單人模式維持每題 10 分。
            if (config.mode === 2 && state.firstCorrectPlayer === null) {
                state.firstCorrectPlayer = playerNum;
                return baseScore + firstHitBonus;
            }

            return baseScore;
        }

        function loseHeart(playerNum) {
            if (state[`p${playerNum}Dead`]) return;

            state.hearts[playerNum]--;
            renderHearts();
            playSfx('error');

            let overlay = document.getElementById(`overlay-p${playerNum}`);
            overlay.style.display = 'block';
            overlay.style.background = 'rgba(255, 0, 0, 0.4)';

            setTimeout(() => {
                if (!state[`p${playerNum}Ready`] && !state[`p${playerNum}Dead`]) {
                    overlay.style.display = 'none';
                    overlay.style.background = '';
                }
            }, 300);

            if (state.hearts[playerNum] <= 0) {
                state[`p${playerNum}Dead`] = true;
                state[`p${playerNum}Ready`] = true;
                clearPlayerTargets(playerNum);

                document.getElementById(`waiting-p${playerNum}`).innerText = "DEAD";
                document.getElementById(`waiting-p${playerNum}`).style.color = 'var(--neon-red)';
                document.getElementById(`waiting-p${playerNum}`).style.display = 'block';

                document.getElementById(`overlay-p${playerNum}`).style.background = 'rgba(255, 0, 0, 0.2)';
                document.getElementById(`overlay-p${playerNum}`).style.display = 'block';

                checkWaveEnd();

                if (config.mode === 1 || (state.p1Dead && state.p2Dead)) {
                    endGame();

        function checkWaveEnd() {
            if (!state.isPlaying) return;
            if (state.waveTransitioning) return;

            if (state.p1Ready && state.p2Ready) {
                state.waveTransitioning = true;
                state.targetVisible = false;

                clearFlyingArrows();
                clearTimeout(state.waveTimeout);

                // 先清掉本輪 Target，再短暫銜接下一輪語音與掉落，避免舊動畫殘留造成閃退或卡住。
                clearAllTargets();

                state.waveTimeout = setTimeout(() => {
                    if (!state.isPlaying) return;

                    if (state.timeLeft <= 0) {
                        endGame();
                        return;
                    }

                    spawnWave();
                }, 300);
            }
        }

        function clearFlyingArrows() {
            const flying = document.getElementById("flying-arrows");

            Array.from(flying.children).forEach(arrow => {
                gsap.killTweensOf(arrow);
                arrow.remove();
            });
        }

        function clearPlayerTargets(playerNum) {
            activeTargets.forEach(t => {
                if (t.player === playerNum && t.active) {
                    t.active = false;
                    gsap.killTweensOf(t.el);
                    gsap.to(t.el, {
                        opacity: 0,
                        duration: 0.15,
                        onComplete: () => {
                            if (t.el && t.el.parentNode) {
                                t.el.remove();
                            }
                        }
                    });
                }
            });
        }

        function clearAllTargets() {
            activeTargets.forEach(t => {
                if (t.el) {
                    gsap.killTweensOf(t.el);
                    if (t.el.parentNode) {
                        t.el.remove();
                    }
                }
            });

            activeTargets = [];

            document.getElementById('falling-targets-p1').innerHTML = '';
            document.getElementById('falling-targets-p2').innerHTML = '';
        }

        function startGameEngine() {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            state.p1Score = 0;
            state.p2Score = 0;
            state.isPlaying = true;
            state.isSpeaking = false;
            state.targetVisible = false;
            state.waveTransitioning = false;
            state.firstCorrectPlayer = null;
            state.waveId++;
            state.hearts = { 1: 5, 2: 5 };
            state.p1Dead = false;
            state.p2Dead = false;
            state.p1Ready = false;
            state.p2Ready = false;

            renderHearts();

            document.getElementById('p1-pts').innerText = 0;
            document.getElementById('p2-pts').innerText = 0;

            document.getElementById('waiting-p1').style.display = 'none';
            document.getElementById('waiting-p2').style.display = 'none';
            document.getElementById('waiting-p1').style.color = '#fff';
            document.getElementById('waiting-p2').style.color = '#fff';

            document.getElementById('overlay-p1').style.display = 'none';
            document.getElementById('overlay-p2').style.display = 'none';

            clearAllTargets();
            clearFlyingArrows();

            if (config.mode === 1) {
                document.getElementById('ctrl-p1').style.width = '100vw';
                document.getElementById('overlay-p1').style.width = '100vw';
                document.getElementById('waiting-p1').style.left = '50vw';
            } else {
                document.getElementById('ctrl-p1').style.width = '50vw';
                document.getElementById('overlay-p1').style.width = '50vw';
                document.getElementById('waiting-p1').style.left = '25vw';
            }

            setTimeout(() => {
                updateLanesToMatchButtons();

                p1Pos = 1;
                p2Pos = 1;

                gsap.set("#bow-p1", {
                    x: p1Lanes[1],
                    y: 920,
                    scale: 0.55
                });

                if (config.mode === 2) {
                    gsap.set("#bow-p2", {
                        x: p2Lanes[1],
                        y: 920,
                        scale: 0.55
                    });
                }

                state.timeLeft = config.duration;
                document.getElementById('ui-timer').innerText = `Time: ${state.timeLeft}s`;

                clearInterval(state.timerInterval);

                state.timerInterval = setInterval(() => {
                    state.timeLeft--;
                    document.getElementById('ui-timer').innerText = `Time: ${state.timeLeft}s`;

                    if (state.timeLeft <= 0) {
                        endGame();
                    }
                }, 1000);

                setTimeout(spawnWave, 200);
            }, 100);
        }

        function spawnWave() {
            if (!state.isPlaying) return;

            if (state.timeLeft <= 0) {
                endGame();
                return;
            }

            clearAllTargets();
            clearFlyingArrows();

            state.targetVisible = false;
            state.isSpeaking = true;
            state.waveTransitioning = false;
            state.firstCorrectPlayer = null;
            state.waveId++;

            const currentWaveId = state.waveId;

            updateLanesToMatchButtons();
            resetBowToCenter();

            let targetLetter = config.selectedLetters[Math.floor(Math.random() * config.selectedLetters.length)];
            state.currentLetter = targetLetter;

            // 聽力答案只會從「已勾選字母」抽出；
            // 干擾項則從 A-Z 全範圍抽出，所以未勾選字母也可能出現在干擾項。
            let distractorPool = alphabet.filter(l => l !== targetLetter);

            let distractors = distractorPool
                .sort(() => Math.random() - 0.5)
                .slice(0, 2);

            let waveLetters = [targetLetter, ...distractors].sort(() => Math.random() - 0.5);

            if (!state.p1Dead) {
                state.p1Ready = false;
                document.getElementById('waiting-p1').style.display = 'none';
                document.getElementById('waiting-p1').style.color = '#fff';
                document.getElementById('overlay-p1').style.display = 'none';
            } else {
                state.p1Ready = true;
            }

            if (config.mode === 2 && !state.p2Dead) {
                state.p2Ready = false;
                document.getElementById('waiting-p2').style.display = 'none';
                document.getElementById('waiting-p2').style.color = '#fff';
                document.getElementById('overlay-p2').style.display = 'none';
            } else {
                state.p2Ready = true;
            }

            playLetterSound(targetLetter, true, () => {
                if (!state.isPlaying || state.waveId !== currentWaveId) return;

                state.isSpeaking = false;
                state.targetVisible = true;

                if (!state.p1Dead) {
                    spawnForZone(
                        waveLetters,
                        1,
                        [...p1Lanes].sort(() => Math.random() - 0.5),
                        'falling-targets-p1',
                        currentWaveId
                    );
                }

                if (config.mode === 2 && !state.p2Dead) {
                    spawnForZone(
                        waveLetters,
                        2,
                        [...p2Lanes].sort(() => Math.random() - 0.5),
                        'falling-targets-p2',
                        currentWaveId
                    );
                }
            });
        }

        function spawnForZone(letters, playerNum, lanes, containerId, waveId) {
            let dropDuration = 14 - (config.dropSpeed * 2);
            let container = document.getElementById(containerId);

            letters.forEach((letter, index) => {
                let targetGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
                targetGroup.setAttribute("class", "target-obj");

                let box = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                box.setAttribute("x", -32);
                box.setAttribute("y", -32);
                box.setAttribute("width", 64);
                box.setAttribute("height", 64);
                box.setAttribute("rx", 10);
                box.setAttribute("fill", "rgba(255, 255, 255, 0.05)");
                box.setAttribute("stroke", "var(--neon-yellow)");
                box.setAttribute("stroke-width", "3");

                let textEl = document.createElementNS("http://www.w3.org/2000/svg", "text");
                textEl.textContent = letter + letter.toLowerCase();
                textEl.setAttribute("class", "target-text");
                textEl.setAttribute("x", 0);
                textEl.setAttribute("y", 0);

                targetGroup.appendChild(box);
                targetGroup.appendChild(textEl);

                let laneX = lanes[index];

                let targetObj = {
                    el: targetGroup,
                    letter: letter,
                    active: true,
                    player: playerNum,
                    laneX: laneX,
                    radius: 32,
                    waveId: waveId
                };

                activeTargets.push(targetObj);
                container.appendChild(targetGroup);

                const dropLoop = () => {
                    if (!state.isPlaying) return;
                    if (!targetObj.active) return;
                    if (targetObj.waveId !== state.waveId) return;
                    if (state[`p${playerNum}Ready`] || state[`p${playerNum}Dead`]) return;

                    const startY = getTargetStartY();
                    const endY = getTargetEndY();

                    gsap.killTweensOf(targetGroup);

                    gsap.set(targetGroup, {
                        x: laneX,
                        y: startY,
                        opacity: 1,
                        scale: 1,
                        visibility: "visible"
                    });

                    gsap.to(targetGroup, {
                        y: endY,
                        duration: dropDuration,
                        ease: "none",
                        onComplete: () => {
                            if (!state.isPlaying) return;
                            if (!targetObj.active) return;
                            if (targetObj.waveId !== state.waveId) return;
                            if (state[`p${playerNum}Ready`] || state[`p${playerNum}Dead`]) return;

                            // 不換輪、不扣分、不消失，回到最上方重新掉落
                            dropLoop();
                        }
                    });
                };

                dropLoop();
            });
        }

        function moveBow(playerNum, dir) {
            if (!state.isPlaying || state[`p${playerNum}Ready`] || state[`p${playerNum}Dead`]) return;

            if (playerNum === 1) {
                p1Pos = Math.max(0, Math.min(2, p1Pos + dir));
                gsap.to("#bow-p1", {
                    x: p1Lanes[p1Pos],
                    duration: 0.15,
                    ease: "power2.out"
                });
            } else {
                p2Pos = Math.max(0, Math.min(2, p2Pos + dir));
                gsap.to("#bow-p2", {
                    x: p2Lanes[p2Pos],
                    duration: 0.15,
                    ease: "power2.out"
                });
            }
        }

        function fireArcadeArrow(playerNum) {
            if (
                !state.isPlaying ||
                state.isSpeaking ||
                !state.targetVisible ||
                state[`p${playerNum}Ready`] ||
                state[`p${playerNum}Dead`]
            ) {
                return;
            }

            playSfx('shoot');

            let bowGroup = playerNum === 1 ? "#bow-p1" : "#bow-p2";
            let color = playerNum === 1 ? "var(--neon-cyan)" : "var(--neon-magenta)";
            let glow = playerNum === 1 ? "neon-cyan-glow" : "neon-magenta-glow";
            let startX = playerNum === 1 ? p1Lanes[p1Pos] : p2Lanes[p2Pos];
            let startY = 920;
            let arrowWaveId = state.waveId;

            gsap.to(`${bowGroup} .string`, {
                attr: { points: "0,-70 -50,0 0,70" },
                duration: 0.05,
                yoyo: true,
                repeat: 1
            });

            let arrowGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            arrowGroup.setAttribute("color", color);
            arrowGroup.setAttribute("class", glow);
            arrowGroup.dataset.waveId = arrowWaveId;

            let arrowUse = document.createElementNS("http://www.w3.org/2000/svg", "use");
            arrowUse.setAttribute("href", "#arrow-graphic");
            arrowUse.setAttribute("transform", "scale(0.55)");

            arrowGroup.appendChild(arrowUse);
            document.getElementById("flying-arrows").appendChild(arrowGroup);

            gsap.set(arrowGroup, {
                x: startX,
                y: startY,
                rotation: -Math.PI / 2 + "rad"
            });

            gsap.to(arrowGroup, {
                y: getSvgYFromScreenY(-120),
                duration: 0.4,
                ease: "none",
                onUpdate: function () {
                    checkArcadeHit(
                        gsap.getProperty(arrowGroup, "y"),
                        startX,
                        arrowGroup,
                        playerNum,
                        this
                    );
                },
                onComplete: () => {
                    if (arrowGroup && arrowGroup.parentNode) {
                        arrowGroup.remove();
                    }
                }
            });
        }

        function checkArcadeHit(arrowY, laneX, arrowEl, playerNum, tween) {
            if (Number(arrowEl.dataset.waveId) !== state.waveId) return;
            if (!state.targetVisible || state.isSpeaking) return;

            for (let i = 0; i < activeTargets.length; i++) {
                let target = activeTargets[i];

                if (!target.active) continue;
                if (target.player !== playerNum) continue;
                if (target.waveId !== state.waveId) continue;
                if (Math.abs(target.laneX - laneX) > 2) continue;

                let targetY = gsap.getProperty(target.el, "y");

                if (!isTargetInVisibleRange(targetY)) continue;

                let hitCenter = Math.abs(arrowY - targetY) <= target.radius;

                if (hitCenter) {
                    tween.kill();

                    if (arrowEl && arrowEl.parentNode) {
                        arrowEl.remove();
                    }

                    if (target.letter === state.currentLetter) {
                        target.active = false;

                        playSfx('success');

                        const earnedScore = calculateScoreForCorrectHit(playerNum);
                        state[`p${playerNum}Score`] += earnedScore;
                        state[`p${playerNum}Ready`] = true;

                        document.getElementById(`p${playerNum}-pts`).innerText = state[`p${playerNum}Score`];

                        document.getElementById(`waiting-p${playerNum}`).innerText = earnedScore > 10 ? "FIRST! +15" : "WAITING...";
                        document.getElementById(`waiting-p${playerNum}`).style.color = earnedScore > 10 ? 'var(--neon-yellow)' : '#fff';
                        document.getElementById(`waiting-p${playerNum}`).style.display = 'block';

                        document.getElementById(`overlay-p${playerNum}`).style.background =
                            playerNum === 1 ? 'rgba(0, 255, 255, 0.15)' : 'rgba(255, 0, 255, 0.15)';

                        document.getElementById(`overlay-p${playerNum}`).style.display = 'block';

                        clearPlayerTargets(playerNum);

                        gsap.to(target.el.querySelector('rect'), {
                            stroke: "#0f0",
                            fill: "rgba(0,255,0,0.5)",
                            duration: 0.1
                        });

                        gsap.to(target.el, {
                            scale: 1.5,
                            opacity: 0,
                            duration: 0.25,
                            onComplete: () => {
                                if (target.el && target.el.parentNode) {
                                    target.el.remove();
                                }
                            }
                        });

                        checkWaveEnd();
                    } else {
                        loseHeart(playerNum);

                        gsap.to(target.el.querySelector('rect'), {
                            stroke: "#f00",
                            fill: "rgba(255,0,0,0.3)",
                            duration: 0.08,
                            yoyo: true,
                            repeat: 1,
                            onComplete: () => {
                                if (target.active) {
                                    target.el.querySelector('rect').setAttribute("stroke", "var(--neon-yellow)");
                                    target.el.querySelector('rect').setAttribute("fill", "rgba(255, 255, 255, 0.05)");
                                }
                            }
                        });

                        gsap.to(target.el, {
                            x: target.laneX + 15,
                            yoyo: true,
                            repeat: 3,
                            duration: 0.05,
                            onComplete: () => {
                                if (target.active) {
                                    gsap.set(target.el, { x: target.laneX });
                                }
                            }
                        });
                    }

                    break;
                }
            }
        }

        document.getElementById('btn-p1-left').addEventListener('pointerdown', () => moveBow(1, -1));
        document.getElementById('btn-p1-right').addEventListener('pointerdown', () => moveBow(1, 1));
        document.getElementById('btn-p1-shoot').addEventListener('pointerdown', () => fireArcadeArrow(1));

        document.getElementById('btn-p2-left').addEventListener('pointerdown', () => moveBow(2, -1));
        document.getElementById('btn-p2-right').addEventListener('pointerdown', () => moveBow(2, 1));
        document.getElementById('btn-p2-shoot').addEventListener('pointerdown', () => fireArcadeArrow(2));

        window.addEventListener('resize', () => {
            if (state.isPlaying) {
                updateLanesToMatchButtons();

                gsap.set("#bow-p1", {
                    x: p1Lanes[p1Pos]
                });

                if (config.mode === 2) {
                    gsap.set("#bow-p2", {
                        x: p2Lanes[p2Pos]
                    });
                }
            }
        });

        function endGame() {
            state.isPlaying = false;
            state.isSpeaking = false;
            state.targetVisible = false;
            state.waveTransitioning = false;
            state.waveId++;

            clearInterval(state.timerInterval);
            clearTimeout(state.waveTimeout);
            clearTimeout(audioTimeout);

            window.speechSynthesis.cancel();

            clearAllTargets();
            clearFlyingArrows();

            document.getElementById('input-name-p1').value = "";
            document.getElementById('input-name-p2').value = "";

            setInputFocus(document.getElementById('input-name-p1'));

            document.getElementById('input-section').style.display = 'flex';
            document.getElementById('leaderboard-section').style.display = 'none';
            document.getElementById('end-buttons').style.display = 'none';

            document.getElementById('game-over-screen').style.display = 'flex';

            document.getElementById('go-score-p1').innerText = state.p1Score + " pts";

            if (config.mode === 2) {
                document.getElementById('go-row-p2').style.display = 'flex';
                document.getElementById('go-score-p2').innerText = state.p2Score + " pts";
            } else {
                document.getElementById('go-row-p2').style.display = 'none';
            }
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            let checkboxes = document.querySelectorAll('.letter-checkbox:checked');
            config.selectedLetters = Array.from(checkboxes).map(cb => cb.value);

            if (config.selectedLetters.length === 0) {
                config.selectedLetters = ['A', 'B', 'C'];
            }

            config.mode = parseInt(document.getElementById('player-mode').value);
            config.duration = parseInt(document.getElementById('game-time').value);
            config.dropSpeed = parseInt(document.getElementById('drop-speed').value);
            config.gender = document.getElementById('voice-gender').value;

            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';

            document.getElementById('ui-score-p2').style.display = config.mode === 2 ? 'inline' : 'none';
            document.getElementById('hearts-p2').style.display = config.mode === 2 ? 'inline' : 'none';
            document.getElementById('center-line').style.display = config.mode === 2 ? 'block' : 'none';
            document.getElementById('ctrl-p2').style.display = config.mode === 2 ? 'flex' : 'none';

            gsap.set("#bow-p2", {
                opacity: config.mode === 2 ? 1 : 0
            });

            startGameEngine();
        });

        document.getElementById('btn-play-again').addEventListener('click', () => {
            document.getElementById('game-over-screen').style.display = 'none';
            startGameEngine();
        });

        document.getElementById('btn-lobby').addEventListener('click', () => {
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('lobby').style.display = 'flex';
        });
    </script>
</body>
</html>
